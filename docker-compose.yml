# Production docker-compose
# Usage: docker compose up -d
# Requires: .env file (copy from .env.example and fill in)

services:

  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      # Override DATABASE_URL to use the internal db service hostname
      DATABASE_URL: postgresql+asyncpg://relay:${POSTGRES_PASSWORD}@db:5432/relay
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    networks:
      - internal
      - web
    # Don't expose port directly — Caddy proxies to it
    expose:
      - "8000"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  migrate:
    # Runs Alembic migrations before the app starts, then exits
    build: .
    command: alembic upgrade head
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://relay:${POSTGRES_PASSWORD}@db:5432/relay
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal
    restart: "no"

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: relay
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: relay
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - internal
    # Not exposed to host — only reachable inside the internal network
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay"]
      interval: 5s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3 (QUIC)
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data      # TLS certificates (persisted across restarts)
      - caddy_config:/config
    networks:
      - web
    depends_on:
      - app
    logging:
      driver: "json-file"
      options:
        max-size: "20m"
        max-file: "3"

volumes:
  postgres_data:
  caddy_data:
  caddy_config:

networks:
  internal:
    driver: bridge
    internal: true   # no external access to this network
  web:
    driver: bridge
